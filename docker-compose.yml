version: '3.8'

services:
  # ==================== Nginx Reverse Proxy ====================
  nginx:
    image: nginx:alpine
    container_name: cpsu-chatbot-nginx
    restart: always
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - cpsu-chatbot-webhook
      - cpsu-chatbot-api
      - cpsu-chatbot-frontend
      - minio

  # ==================== Application Services ====================
  cpsu-chatbot-webhook:
    build:
      context: ./cpsu-chatbot-webhook
    image: cpsu-chatbot-webhook-image
    container_name: 'cpsu-chatbot-webhook'
    restart: always
    env_file:
      - .env
    expose:
      - "${PORT_WEBHOOK}"
    depends_on:
      - redis
      - minio
      - qdrant
      - rabbitmq

  cpsu-chatbot-api:
    build:
      context: ./cpsu-chatbot-api
    container_name: 'cpsu-chatbot-api'
    image: cpsu-chatbot-api-image  
    expose:
      - "${PORT_API}"
    env_file:
      - .env
    restart: always
    depends_on:
      - redis
      - minio
      - qdrant

  cpsu-chatbot-frontend:
    build: 
      context: ./cpsu-chatbot-frontend
      args:
        VITE_API_DOMAIN: ${VITE_API_DOMAIN}
    container_name: cpsu-chatbot-frontend
    image: cpsu-chatbot-frontend-image
    expose:
      - "5173"
    restart: always
    depends_on:
      - cpsu-chatbot-api

  # ==================== Infrastructure Services ====================
  redis:
    image: redis/redis-stack-server:latest
    container_name: cpsu-chatbot-redis
    restart: always
    environment:
      - REDIS_ARGS=--port 6380 --requirepass ${REDIS_PASSWORD}
    ports:
      - "${EXTERNAL_REDIS_PORT}:6380"
    volumes:
      - ./docker_volumes/redis_data:/data

  rabbitmq:
    image: rabbitmq:3-alpine
    container_name: cpsu-chatbot-rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "${EXTERNAL_RABBITMQ_PORT}:5672"
    volumes:
      - ./docker_volumes/rabbitmq_data:/var/lib/rabbitmq

  minio:
    image: minio/minio:latest
    container_name: cpsu-chatbot-minio
    restart: always
    expose:
      - "9000"
    ports:
      - "${EXTERNAL_MINIO_UI_PORT}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - ./docker_volumes/minio_data:/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: cpsu-chatbot-qdrant
    restart: always
    ports:
      - "${EXTERNAL_QDRANT_API_PORT}:6333"
      - "${EXTERNAL_QDRANT_GRPC_PORT}:6334"
    volumes:
      - ./docker_volumes/qdrant_data:/qdrant/storage